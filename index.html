<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<title>Orapsolozis?</title>

<style>
/* ====== BASIC RESET ====== */
body {
    margin: 0;
    min-height: 100vh;
    font-family: "Comic Sans MS", "Segoe UI", sans-serif;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;

    background:
        linear-gradient(135deg, #ffd6e8, #d6f5ff);
}

/* ====== FLOATING HEARTS ====== */
.heart {
    position: absolute;
    width: 20px;
    height: 20px;
    background: pink;
    transform: rotate(45deg);
    animation: floatUp 10s linear infinite;
    opacity: 0.6;
}

.heart::before,
.heart::after {
    content: "";
    position: absolute;
    width: 20px;
    height: 20px;
    background: pink;
    border-radius: 50%;
}

.heart::before {
    top: -10px;
    left: 0;
}

.heart::after {
    left: -10px;
    top: 0;
}

@keyframes floatUp {
    from {
        transform: translateY(100vh) rotate(45deg);
    }
    to {
        transform: translateY(-20vh) rotate(45deg);
    }
}

/* ====== CARD ====== */
.card {
    background: white;
    padding: 40px;
    border-radius: 25px;
    box-shadow: 0 15px 30px rgba(0,0,0,0.15);
    text-align: center;
    max-width: 500px;
    z-index: 10;
}

/* ====== TEXT ====== */
h2 {
    font-size: 28px;
    color: #ff6fae;
    margin-bottom: 30px;
}

/* ====== BUTTONS ====== */
button {
    background: linear-gradient(135deg, #ff9acb, #ff6fae);
    color: white;
    border: none;
    border-radius: 999px;
    padding: 12px 30px;
    font-size: 18px;
    margin: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 8px 15px rgba(255,111,174,0.4);
}

button:hover {
    transform: translateY(-2px) scale(1.05);
}

/* ====== MESSAGE ====== */
#message {
    font-size: 26px;
    color: #7a4cff;
}

/* ====== IMAGES ====== */
#images {
    display: none;
    margin-top: 20px;
}

#images img {
    width: 180px;
    border-radius: 20px;
    margin: 10px;
    box-shadow: 0 8px 15px rgba(0,0,0,0.2);
    transition: transform 0.2s;
}

#images img:hover {
    transform: scale(1.08) rotate(2deg);
}

/* ====== CONFETTI ====== */
.confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    background: red;
    animation: confettiFall 3s linear forwards;
}

@keyframes confettiFall {
    from {
        transform: translateY(0) rotate(0deg);
        opacity: 1;
    }
    to {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
    }
}
</style>
</head>

<body>

<!-- FLOATING HEARTS -->
<script>
for (let i = 0; i < 15; i++) {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = 6 + Math.random() * 6 + "s";
    document.body.appendChild(heart);
}
</script>

<div class="card" id="question">
    <h2>Da li treba da se oraspolozis?</h2>
    <button onclick="selectNe()">Ne</button>
    <button onclick="selectDa()">Da</button>
</div>

<div class="card" id="result" style="display:none;">
    <p id="message"></p>
    <div id="images">
    <img src="images/1.jpg" alt="Slika 1">
    <img src="images/2.jpg" alt="Slika 2">
    <img src="images/3.jpg" alt="Slika 3">
    <img src="images/4.jpg" alt="Slika 4">

    </div>
</div>

<script>
function selectNe() {
    document.getElementById("question").style.display = "none";
    document.getElementById("result").style.display = "block";
    document.getElementById("message").innerText = "Prijatan dan!";
}

function selectDa() {
    document.getElementById("question").style.display = "none";
    document.getElementById("result").style.display = "block";
    document.getElementById("images").style.display = "block";
    launchConfetti();
}

/* CONFETTI FUNCTION */
function launchConfetti() {
    for (let i = 0; i < 100; i++) {
        const confetti = document.createElement("div");
        confetti.classList.add("confetti");
        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.backgroundColor =
            ["#ff6fae", "#ffcc00", "#7a4cff", "#00d4ff"]
            [Math.floor(Math.random() * 4)];
        confetti.style.animationDuration = 2 + Math.random() * 2 + "s";
        document.body.appendChild(confetti);

        setTimeout(() => confetti.remove(), 4000);
    }
}
</script>

</body>
</html>
